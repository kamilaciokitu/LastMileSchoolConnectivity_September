<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Connectivity Infrastructure Map — ITU BDT / ITU ACADEMY</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'Courier New', Courier, monospace;
    --backbone: #185FA5; --backbone-light: #E6F1FB; --backbone-mid: #85B7EB;
    --middle: #0F6E56;   --middle-light: #E1F5EE;   --middle-mid: #5DCAA5;
    --last: #993C1D;     --last-light: #FAECE7;     --last-mid: #F0997B;
    --bg: #0d1b2a; --card: #1a2a3a; --text: #f0f4f8; --muted: #8899aa; --border: rgba(255,255,255,0.1);
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header {
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(13,27,42,0.95);
    flex-shrink: 0;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .logos { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
  .logos span { font-weight: 700; color: #aac4dd; }

  /* Legend */
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    padding: 8px 20px;
    background: rgba(13,27,42,0.9);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; transition: opacity 0.2s; }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
  .legend-sep { width: 1px; height: 16px; background: var(--border); }
  .legend-hint { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-left: auto; }

  /* Map container */
  .map-wrap { flex: 1; position: relative; overflow: hidden; }
  #map-svg { width: 100%; height: 100%; display: block; }

  /* Points */
  .point { cursor: pointer; transition: transform 0.15s; transform-origin: center; }
  .point:hover { transform: scale(1.4); }
  .point circle.ring { fill: none; stroke-width: 1.5; opacity: 0.5; }
  .point circle.dot { stroke: rgba(255,255,255,0.4); stroke-width: 1; }
  .point.backbone circle.ring { stroke: var(--backbone); }
  .point.backbone circle.dot { fill: var(--backbone); }
  .point.middle circle.ring { stroke: var(--middle); }
  .point.middle circle.dot { fill: var(--middle); }
  .point.last circle.ring { stroke: var(--last); }
  .point.last circle.dot { fill: var(--last); }
  .point.active circle.ring { opacity: 1; stroke-width: 2.5; }

  /* Panel */
  #panel {
    position: absolute; top: 16px; right: 16px;
    width: 300px; max-height: calc(100% - 32px);
    background: rgba(20,34,50,0.97);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    display: none;
    backdrop-filter: blur(8px);
  }
  #panel.open { display: block; }
  .panel-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); position: relative; }
  .panel-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 6px; }
  .panel-close:hover { background: var(--border); color: var(--text); }
  .panel-layer { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  .panel-layer.backbone { color: var(--backbone-mid); }
  .panel-layer.middle   { color: var(--middle-mid); }
  .panel-layer.last     { color: var(--last-mid); }
  .panel-title { font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
  .panel-location { font-size: 12px; color: var(--muted); }
  .panel-badge { display: inline-block; margin-top: 8px; font-size: 11px; font-family: var(--mono); padding: 3px 8px; border-radius: 5px; font-weight: 600; }
  .badge-backbone { background: var(--backbone-light); color: var(--backbone); }
  .badge-middle   { background: var(--middle-light);   color: var(--middle); }
  .badge-last     { background: var(--last-light);     color: var(--last); }

  .panel-body { padding: 14px 18px; }
  .prow { margin-bottom: 13px; }
  .prow:last-child { margin-bottom: 0; }
  .prow-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .prow-value { font-size: 13px; line-height: 1.6; color: var(--text); }
  .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); background: rgba(255,255,255,0.04); }
  .cost-bar { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.08); margin-top: 6px; overflow: hidden; }
  .cost-fill { height: 100%; border-radius: 99px; }

  /* Tooltip */
  #tooltip {
    position: absolute; pointer-events: none;
    background: rgba(20,34,50,0.95); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 11px;
    font-size: 12px; color: var(--text);
    white-space: nowrap; display: none;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  #tooltip .tt-layer { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-bottom: 2px; }

  @media (max-width: 600px) {
    #panel { width: calc(100vw - 32px); top: auto; bottom: 16px; right: 16px; max-height: 55vh; }
    .legend-hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title">Global Connectivity Infrastructure Map</div>
      <div class="header-sub">Scenario analysis · Last mile school connectivity</div>

</div>

const layerVis = { backbone: true, middle: true, last: true };
let activePoint = null;

function toggleLayer(layer, el) {
  layerVis[layer] = !layerVis[layer];
  el.classList.toggle('dimmed', !layerVis[layer]);
  document.querySelectorAll(`.point.${layer}`).forEach(p => {
    p.style.display = layerVis[layer] ? '' : 'none';
  });
}

function costColor(v) {
  if (v >= 75) return '#E24B4A';
  if (v >= 45) return '#EF9F27';
  return '#1D9E75';
}

function layerLabel(l) {
  return l === 'backbone' ? 'Backbone Layer' : l === 'middle' ? 'Middle Mile Layer' : 'Last Mile Layer';
}

function renderPoints() {
  const g = document.getElementById('points-layer');
  POINTS.forEach(pt => {
    const { x, y } = proj(pt.lon, pt.lat);
    const el = document.createElementNS('http://www.w3.org/2000/svg','g');
    el.setAttribute('class', `point ${pt.layer}`);
    el.setAttribute('transform', `translate(${x},${y})`);
    el.innerHTML = `<circle class="ring" r="9"/><circle class="dot" r="5"/>`;
    el.addEventListener('click', () => openPanel(pt, el));
    el.addEventListener('mouseenter', e => showTooltip(e, pt));
    el.addEventListener('mouseleave', hideTooltip);
    g.appendChild(el);
  });
}

function openPanel(pt, el) {
  if (activePoint) activePoint.classList.remove('active');
  activePoint = el;
  el.classList.add('active');

  const panel = document.getElementById('panel');
  document.getElementById('p-layer').textContent = layerLabel(pt.layer);
  document.getElementById('p-layer').className = `panel-layer ${pt.layer}`;
  document.getElementById('p-title').textContent = pt.name;
  document.getElementById('p-location').textContent = '📍 ' + pt.location;
  const badge = document.getElementById('p-badge');
  badge.textContent = pt.layer === 'backbone' ? 'Backbone' : pt.layer === 'middle' ? 'Middle mile' : 'Last mile';
  badge.className = `panel-badge badge-${pt.layer}`;

  const tags  = pt.tech.map(t => `<span class="tag">${t}</span>`).join('');
  const cases = pt.cases.map(t => `<span class="tag">${t}</span>`).join('');
  const bar   = pt.costLevel > 0 ? `<div class="cost-bar"><div class="cost-fill" style="width:${pt.costLevel}%;background:${costColor(pt.costLevel)}"></div></div>` : '';

  document.getElementById('p-body').innerHTML = `
    <div class="prow"><div class="prow-label">Role</div><div class="prow-value">${pt.role}</div></div>
    <div class="prow"><div class="prow-label">Coverage</div><div class="prow-value">${pt.coverage}</div></div>
    <div class="prow"><div class="prow-label">Cost</div><div class="prow-value">${pt.cost}${bar}</div></div>
    <div class="prow"><div class="prow-label">Strengths</div><div class="prow-value">${pt.strengths}</div></div>
    <div class="prow"><div class="prow-label">Limitations</div><div class="prow-value">${pt.limitations}</div></div>
    <div class="prow"><div class="prow-label">Technologies</div><div class="tag-list">${tags}</div></div>
    <div class="prow"><div class="prow-label">Use cases</div><div class="tag-list">${cases}</div></div>`;

  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activePoint) { activePoint.classList.remove('active'); activePoint = null; }
}

const tooltip = document.getElementById('tooltip');
function showTooltip(e, pt) {
  document.getElementById('tt-layer').textContent = layerLabel(pt.layer);
  document.getElementById('tt-name').textContent = pt.name;
  tooltip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const wrap = document.querySelector('.map-wrap').getBoundingClientRect();
  let tx = e.clientX - wrap.left + 14, ty = e.clientY - wrap.top - 36;
  if (tx + 220 > wrap.width) tx = e.clientX - wrap.left - 220;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }
document.querySelector('.map-wrap').addEventListener('mousemove', e => {
  if (tooltip.style.display === 'block') moveTooltip(e);
});

renderPoints();
</script>
